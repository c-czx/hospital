<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>医生工作台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
<div class="container" style="margin-top: 30px;">
    <h3>今日预约患者</h3>
    <table class="table table-bordered" style="margin-top:20px;">
        <thead>
        <tr>
            <th>患者姓名</th>
            <th>性别</th>
            <th>年龄</th>
            <th>预约时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(todayList)}">
            <td colspan="5" style="text-align:center;">暂无今日预约患者</td>
        </tr>
        <tr th:each="patient : ${todayList}">
            <td th:text="${patient.name}"></td>
            <td th:text="${patient.gender == 'male' ? '男' : '女'}"></td>
            <td th:text="${patient.age}"></td>
            <td th:text="${#temporals.format(patient.appointmentTime, 'HH:mm')}"></td>
            <td>
                <a class="btn btn-info btn-sm" th:href="@{/doctor/appointment-detail(patientId=${patient.id})}">查看详情</a>
                <a class="btn btn-success btn-sm" th:href="@{/doctor/prescription-form(patientId=${patient.id})}">诊疗开方</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top:20px;">
        <a href="/doctor/schedule" class="btn btn-primary">发布号源 / 排班管理</a>
        <a href="/doctor/appointments" class="btn btn-default" style="margin-left:10px;">全部预约</a>
    </div>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>
</html>
