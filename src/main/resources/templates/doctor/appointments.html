<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的就诊</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .container-fluid {
            padding-top: 20px;
        }
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: #10b981;
            color: white;
        }
        .main-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/doctor/dashboard">医院管理系统 - 医生端</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/doctor/profile"><span class="glyphicon glyphicon-user"></span> 个人信息</a></li>
            <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> 退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <ul>
                <li><a href="/doctor/dashboard"><span class="glyphicon glyphicon-home"></span> 医生首页</a></li>
                <li><a href="/doctor/schedule"><span class="glyphicon glyphicon-time"></span> 号源发布</a></li>
                <li><a href="/doctor/patients"><span class="glyphicon glyphicon-user"></span> 我的就诊</a></li>
                <li><a href="/doctor/prescriptions"><span class="glyphicon glyphicon-list-alt"></span> 处方管理</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <h3>我的就诊患者</h3>
            <table class="table table-bordered" style="margin-top:20px;">
                <thead>
                <tr>
                    <th>患者姓名</th>
                    <th>性别</th>
                    <th>年龄</th>
                    <th>预约时间</th>
                    <th>症状</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(allAppointments)}">
                    <td colspan="7" style="text-align:center;">暂无就诊信息</td>
                </tr>
                <tr th:each="apt : ${allAppointments}">
                    <td th:text="${apt.name}"></td>
                    <td th:text="${apt.gender == 'male' ? '男' : '女'}"></td>
                    <td th:text="${apt.age}"></td>
                    <td th:text="${#temporals.format(apt.appointmentTime, 'yyyy-MM-dd HH:mm')}"></td>
                    <td th:text="${apt.symptoms}"></td>
                    <td>
                        <span th:if="${apt.status == '已预约'}" class="label label-info">已预约</span>
                        <span th:if="${apt.status == '已完成'}" class="label label-success">已完成</span>
                        <span th:if="${apt.status == '已取消'}" class="label label-danger">已取消</span>
                    </td>
                    <td>
                        <a class="btn btn-info btn-sm" th:href="@{/doctor/appointment-detail(patientId=${apt.id})}">查看病历</a>
                        <a class="btn btn-success btn-sm" th:href="@{/doctor/prescription-form(patientId=${apt.id})}">开具处方</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/doctor/dashboard" class="btn btn-default">返回工作台</a>
        </div>
    </div>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>
</html>
