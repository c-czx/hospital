<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人信息</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .container {
            padding-top: 20px;
        }
        .profile-container {
            background: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/doctor/dashboard">医院管理系统 - 医生端</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/doctor/profile"><span class="glyphicon glyphicon-user"></span> 个人信息</a></li>
            <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> 退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="profile-container">
        <h2 style="margin-bottom: 30px;">个人信息</h2>

        <form method="post" th:action="@{/doctor/profile/update}">
            <div class="form-group">
                <label>姓名：</label>
                <input type="text" class="form-control" name="name" th:value="${doctor.user.name}" required>
            </div>
            <div class="form-group">
                <label>性别：</label>
                <select class="form-control" name="gender">
                    <option value="male" th:selected="${doctor.user.gender == 'male'}">男</option>
                    <option value="female" th:selected="${doctor.user.gender == 'female'}">女</option>
                </select>
            </div>
            <div class="form-group">
                <label>年龄：</label>
                <input type="number" class="form-control" name="age" th:value="${doctor.user.age}">
            </div>
            <div class="form-group">
                <label>手机号：</label>
                <input type="text" class="form-control" name="phone" th:value="${doctor.user.phone}" required>
            </div>
            <div class="form-group">
                <label>邮箱：</label>
                <input type="email" class="form-control" name="email" th:value="${doctor.user.email}">
            </div>

            <hr>

            <div class="form-group">
                <label>职称：</label>
                <input type="text" class="form-control" name="title" th:value="${doctor.title}" required>
            </div>
            <div class="form-group">
                <label>专长：</label>
                <textarea class="form-control" name="specialty" rows="3" th:text="${doctor.specialty}" required></textarea>
            </div>
            <div class="form-group">
                <label>排班信息：</label>
                <textarea class="form-control" name="schedule" rows="3" th:text="${doctor.schedule}" required></textarea>
            </div>

            <div style="margin-top: 30px;">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="/doctor/dashboard" class="btn btn-default">返回主页</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
