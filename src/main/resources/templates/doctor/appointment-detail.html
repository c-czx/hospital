<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者详情 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>医生中心</h3>
            <ul>
                <li><a href="/doctor/dashboard">首页</a></li>
                <li><a href="/doctor/schedule">号源发布</a></li>
                <li><a href="/doctor/patients">我的就诊</a></li>
                <li><a href="/doctor/prescriptions">处方管理</a></li>
                <li><a href="/doctor/checkups">检查管理</a></li>
                <li><a href="/doctor/profile">个人信息</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>患者详情</h1>
            
            <div class="appointment-detail">
                <h3>患者信息</h3>
                <p><strong>姓名：</strong><span th:text="${patient.name}"></span></p>
                <p><strong>性别：</strong><span th:text="${patient.gender == 'male' ? '男' : '女'}"></span></p>
                <p><strong>年龄：</strong><span th:text="${patient.age}"></span></p>
                <p><strong>电话：</strong><span th:text="${patient.phone}"></span></p>
                <p><strong>邮箱：</strong><span th:text="${patient.email}"></span></p>
            </div>
            
            <div class="appointment-detail" style="margin-top: 30px;">
                <h3>保存病历</h3>
                <form method="post" th:action="@{/doctor/saveRecord}">
                    <input type="hidden" name="doctorId" th:value="${doctorId}">
                    <input type="hidden" name="user.id" th:value="${patient.id}">

                    <div class="form-group">
                        <label>主诉：</label>
                        <textarea name="chiefComplaint" class="form-control" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>现病史：</label>
                        <textarea name="presentIllness" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>诊断结果：</label>
                        <textarea name="diagnosisResult" class="form-control" rows="2" required></textarea>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn btn-primary">保存病历</button>
                    </div>
                </form>
            </div>
            
            <div class="appointment-detail" style="margin-top: 30px;">
                <h3>开具处方</h3>
                <form method="post" th:action="@{/doctor/createPrescription}">
                    <input type="hidden" name="doctorId" th:value="${doctorId}">
                    <input type="hidden" name="patientId" th:value="${patient.id}">

                    <div class="form-group">
                        <label>药品列表：</label>
                        <input type="text" name="drugList" class="form-control" placeholder="例：阿莫西林，布洛芬" required>
                    </div>
                    <div class="form-group">
                        <label>用法用量：</label>
                        <textarea name="usage" class="form-control" rows="2" placeholder="例：口服，一日三次，一次一片" required></textarea>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn btn-primary">确认开方</button>
                    </div>
                </form>
            </div>
            
            <div class="appointment-detail" style="margin-top: 30px;">
                <h3>添加医嘱</h3>
                <form method="post" th:action="@{/doctor/createAdvice}">
                    <input type="hidden" name="doctorId" th:value="${doctorId}">
                    <input type="hidden" name="user.id" th:value="${patient.id}">

                    <div class="form-group">
                        <label>医嘱内容：</label>
                        <textarea name="content" class="form-control" rows="3" placeholder="例：注意休息，多喝水，避免剧烈运动" required></textarea>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn btn-primary">添加医嘱</button>
                    </div>
                </form>
            </div>
            
            <div class="appointment-detail" th:if="${adviceList != null and !#lists.isEmpty(adviceList)}" style="margin-top: 30px;">
                <h3>历史医嘱</h3>
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>医嘱内容</th>
                        <th>状态</th>
                        <th>创建时间</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="advice : ${adviceList}">
                        <td th:text="${advice.content}"></td>
                        <td>
                            <span th:if="${advice.status == 1}" class="status" style="background-color: #4caf50; color: white;">有效</span>
                            <span th:if="${advice.status == 0}" class="status" style="background-color: #e9ecef; color: #333;">无效</span>
                        </td>
                        <td th:text="${#temporals.format(advice.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="appointment-detail" style="margin-top: 30px;">
                <h3>开具检查</h3>
                <a th:href="@{/doctor/checkup-form(patientId=${patient.id})}" class="btn btn-primary">开具检查</a>
            </div>
            
            <div class="actions" style="margin-top: 30px;">
                <a href="/doctor/dashboard" class="btn btn-secondary">返回工作台</a>
            </div>
        </div>
    </div>
</body>
</html>
