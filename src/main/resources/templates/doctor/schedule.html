<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>号源发布</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
<div class="container" style="margin-top:30px;">
    <h3>发布号源 / 排班设置</h3>
    <form method="post" th:action="@{/doctor/publishSchedule}">
        <div class="form-group">
            <label>可预约开始时间：</label>
            <input type="datetime-local" name="startTime" class="form-control" required>
        </div>
        <div class="form-group">
            <label>可预约结束时间：</label>
            <input type="datetime-local" name="endTime" class="form-control" required>
        </div>
        <div class="form-group">
            <label>总号源数量：</label>
            <input type="number" name="totalNumber" class="form-control" value="20" min="1" max="100" required>
        </div>
        <button type="submit" class="btn btn-primary">发布号源</button>
    </form>

    <h3 style="margin-top:40px;">我的排班</h3>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>开始时间</th>
            <th>结束时间</th>
            <th>总号源</th>
            <th>剩余号源</th>
            <th>状态</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(scheduleList)}">
            <td colspan="5" style="text-align:center;">暂无排班信息</td>
        </tr>
        <tr th:each="sch : ${scheduleList}">
            <td th:text="${#temporals.format(sch.startTime, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${#temporals.format(sch.endTime, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${sch.totalNumber}"></td>
            <td th:text="${sch.remainNumber}"></td>
            <td>
                <span th:if="${sch.status == 1}" class="label label-success">已发布</span>
                <span th:if="${sch.status != 1}" class="label label-default">未发布</span>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/doctor/dashboard" class="btn btn-default">返回工作台</a>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>
</html>
