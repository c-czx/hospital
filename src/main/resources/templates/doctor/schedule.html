<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>号源发布</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .container-fluid {
            padding-top: 20px;
        }
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: #10b981;
            color: white;
        }
        .main-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-group label {
            font-weight: bold;
            color: #333;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/doctor/dashboard">医院管理系统 - 医生端</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/doctor/profile"><span class="glyphicon glyphicon-user"></span> 个人信息</a></li>
            <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> 退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <ul>
                <li><a href="/doctor/dashboard"><span class="glyphicon glyphicon-home"></span> 医生首页</a></li>
                <li><a href="/doctor/schedule"><span class="glyphicon glyphicon-time"></span> 号源发布</a></li>
                <li><a href="/doctor/patients"><span class="glyphicon glyphicon-user"></span> 我的就诊</a></li>
                <li><a href="/doctor/prescriptions"><span class="glyphicon glyphicon-list-alt"></span> 处方管理</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <h3>发布号源 / 排班设置</h3>
            <form method="post" th:action="@{/doctor/publishSchedule}" style="margin-top: 20px;">
                <div class="form-group">
                    <label>选择日期：</label>
                    <input type="date" name="scheduleDate" class="form-control" required id="scheduleDate">
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>开始时间：</label>
                            <select name="startHour" class="form-control" required>
                                <option value="">请选择小时</option>
                                <option th:each="h : ${#numbers.sequence(8, 17)}" th:value="${h}" th:text="${h} + ':00'"></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>结束时间：</label>
                            <select name="endHour" class="form-control" required>
                                <option value="">请选择小时</option>
                                <option th:each="h : ${#numbers.sequence(9, 18)}" th:value="${h}" th:text="${h} + ':00'"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>总号源数量：</label>
                    <input type="number" name="totalNumber" class="form-control" value="20" min="1" max="100" required>
                </div>
                <button type="submit" class="btn btn-primary">发布号源</button>
            </form>

            <h3 style="margin-top:40px;">我的排班</h3>
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>开始时间</th>
                    <th>结束时间</th>
                    <th>总号源</th>
                    <th>剩余号源</th>
                    <th>状态</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(scheduleList)}">
                    <td colspan="5" style="text-align:center;">暂无排班信息</td>
                </tr>
                <tr th:each="sch : ${scheduleList}">
                    <td th:text="${#temporals.format(sch.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                    <td th:text="${#temporals.format(sch.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                    <td th:text="${sch.totalNumber}"></td>
                    <td th:text="${sch.remainNumber}"></td>
                    <td>
                        <span th:if="${sch.status == 1}" class="label label-success">已发布</span>
                        <span th:if="${sch.status == 2}" class="label label-danger">已过期</span>
                        <span th:if="${sch.status != 1 and sch.status != 2}" class="label label-default">未发布</span>
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/doctor/dashboard" class="btn btn-default">返回工作台</a>
        </div>
    </div>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>
</html>
