<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检查项目详情 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending {
            background-color: #ffeb3b;
            color: #333;
        }
        .status-completed {
            background-color: #4caf50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>医生中心</h3>
            <ul>
                <li><a href="/doctor/dashboard">首页</a></li>
                <li><a href="/doctor/schedule">号源发布</a></li>
                <li><a href="/doctor/patients">我的就诊</a></li>
                <li><a href="/doctor/prescriptions">处方管理</a></li>
                <li><a href="/doctor/checkups">检查管理</a></li>
                <li><a href="/doctor/profile">个人信息</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>检查项目详情</h1>
            <div class="appointment-detail">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="control-label">检查类型：</label>
                            <span th:text="${checkup.type}"></span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">检查描述：</label>
                            <span th:text="${checkup.description}"></span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">检查结果：</label>
                            <span th:text="${checkup.result}"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="control-label">患者姓名：</label>
                            <span th:text="${checkup.user.name}"></span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">医生姓名：</label>
                            <span th:text="${checkup.doctor.user.name}"></span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">状态：</label>
                            <span class="status" th:classappend="${checkup.status == 0 ? 'status-pending' : 'status-completed'}">
                                <span th:text="${checkup.status == 0 ? '待检查' : '已完成'}"></span>
                            </span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">创建时间：</label>
                            <span th:text="${checkup.createTime}"></span>
                        </div>
                        <div class="form-group">
                            <label class="control-label">更新时间：</label>
                            <span th:text="${checkup.updateTime}"></span>
                        </div>
                    </div>
                </div>
                <div class="actions" style="margin-top: 30px;">
                    <a href="/doctor/checkups" class="btn btn-primary">返回列表</a>
                    <a th:if="${checkup.status == 0}" th:href="@{/doctor/update-checkup(id=${checkup.id})}" class="btn btn-secondary">更新状态</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
