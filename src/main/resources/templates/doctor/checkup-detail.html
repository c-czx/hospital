<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>检查项目详情</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .container-fluid {
            padding-top: 20px;
        }
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: #10b981;
            color: white;
        }
        .main-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending {
            background-color: #ffeb3b;
            color: #333;
        }
        .status-completed {
            background-color: #4caf50;
            color: white;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/doctor/dashboard">医院管理系统 - 医生端</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/doctor/profile"><span class="glyphicon glyphicon-user"></span> 个人信息</a></li>
            <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> 退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <ul>
                <li><a href="/doctor/dashboard"><span class="glyphicon glyphicon-home"></span> 医生首页</a></li>
                <li><a href="/doctor/schedule"><span class="glyphicon glyphicon-time"></span> 号源发布</a></li>
                <li><a href="/doctor/patients"><span class="glyphicon glyphicon-user"></span> 我的就诊</a></li>
                <li><a href="/doctor/prescriptions"><span class="glyphicon glyphicon-list-alt"></span> 处方管理</a></li>
                <li><a href="/doctor/checkups"><span class="glyphicon glyphicon-stethoscope"></span> 检查管理</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <h3>检查项目详情</h3>
            <div class="panel panel-default" style="margin-top:20px;">
                <div class="panel-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="control-label">检查类型：</label>
                                <span th:text="${checkup.type}"></span>
                            </div>
                            <div class="form-group">
                                <label class="control-label">检查描述：</label>
                                <span th:text="${checkup.description}"></span>
                            </div>
                            <div class="form-group">
                                <label class="control-label">检查结果：</label>
                                <span th:text="${checkup.result}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="control-label">患者姓名：</label>
                                <span th:text="${checkup.user.name}"></span>
                            </div>
                            <div class="form-group">
                                <label class="control-label">医生姓名：</label>
                                <span th:text="${checkup.doctor.user.name}"></span>
                            </div>
                            <div class="form-group">
                                <label class="control-label">状态：</label>
                                <span class="status" th:classappend="${checkup.status == 0 ? 'status-pending' : 'status-completed'}">
                                    <span th:text="${checkup.status == 0 ? '待检查' : '已完成'}"></span>
                                </span>
                            </div>
                            <div class="form-group">
                                <label class="control-label">创建时间：</label>
                                <span th:text="${checkup.createTime}"></span>
                            </div>
                            <div class="form-group">
                                <label class="control-label">更新时间：</label>
                                <span th:text="${checkup.updateTime}"></span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:20px;">
                        <a href="/doctor/checkups" class="btn btn-primary">返回列表</a>
                        <th:block th:if="${checkup.status == 0}">
                            <a th:href="@{/doctor/update-checkup(id=${checkup.id})}" class="btn btn-success">更新状态</a>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
