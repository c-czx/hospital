<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新检查状态 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>医生中心</h3>
            <ul>
                <li><a href="/doctor/dashboard">首页</a></li>
                <li><a href="/doctor/schedule">号源发布</a></li>
                <li><a href="/doctor/patients">我的就诊</a></li>
                <li><a href="/doctor/prescriptions">处方管理</a></li>
                <li><a href="/doctor/checkups">检查管理</a></li>
                <li><a href="/doctor/profile">个人信息</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>更新检查状态</h1>
            <div class="appointment-detail">
                <form action="/doctor/update-checkup" method="post" style="margin-top: 20px;">
                    <input type="hidden" name="id" th:value="${checkup.id}">
                    <input type="hidden" name="type" th:value="${checkup.type}">
                    <input type="hidden" name="description" th:value="${checkup.description}">
                    <input type="hidden" name="userId" th:value="${checkup.user.id}">
                    <input type="hidden" name="doctorId" th:value="${checkup.doctor.id}">
                    <input type="hidden" name="createTime" th:value="${checkup.createTime}">
                    
                    <div class="form-group">
                        <label for="result">检查结果</label>
                        <textarea id="result" name="result" class="form-control" rows="4" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">状态</label>
                        <select id="status" name="status" class="form-control" required>
                            <option value="0">待检查</option>
                            <option value="1">已完成</option>
                        </select>
                    </div>
                    
                    <div class="actions" style="margin-top: 30px;">
                        <a href="/doctor/checkups" class="btn btn-danger">取消</a>
                        <button type="submit" class="btn btn-primary">提交</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
