<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开具检查 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>医生中心</h3>
            <ul>
                <li><a href="/doctor/dashboard">首页</a></li>
                <li><a href="/doctor/schedule">号源发布</a></li>
                <li><a href="/doctor/patients">我的就诊</a></li>
                <li><a href="/doctor/prescriptions">处方管理</a></li>
                <li><a href="/doctor/checkups">检查管理</a></li>
                <li><a href="/doctor/profile">个人信息</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>开具检查</h1>
            <div class="appointment-detail">
                <form action="/doctor/createCheckup" method="post" style="margin-top: 20px;">
                    <input type="hidden" name="doctorId" value="${doctorId}">
                    <input type="hidden" name="patientId" value="${patientId}">
                    
                    <div class="form-group">
                        <label for="type">检查类型</label>
                        <select id="type" name="type" class="form-control" required>
                            <option value="">请选择检查类型</option>
                            <option value="体温">体温</option>
                            <option value="血压">血压</option>
                            <option value="胸片">胸片</option>
                            <option value="血常规">血常规</option>
                            <option value="尿常规">尿常规</option>
                            <option value="心电图">心电图</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">检查描述</label>
                        <textarea id="description" name="description" class="form-control" rows="4" required></textarea>
                    </div>
                    
                    <div class="actions" style="margin-top: 30px;">
                        <button type="button" class="btn btn-danger" onclick="window.history.back()">取消</button>
                        <button type="submit" class="btn btn-primary">提交</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
