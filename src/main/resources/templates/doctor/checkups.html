<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>检查项目列表</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .container-fluid {
            padding-top: 20px;
        }
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: #10b981;
            color: white;
        }
        .main-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending {
            background-color: #ffeb3b;
            color: #333;
        }
        .status-completed {
            background-color: #4caf50;
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/doctor/dashboard">医院管理系统 - 医生端</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/doctor/profile"><span class="glyphicon glyphicon-user"></span> 个人信息</a></li>
            <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> 退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <ul>
                <li><a href="/doctor/dashboard"><span class="glyphicon glyphicon-home"></span> 医生首页</a></li>
                <li><a href="/doctor/schedule"><span class="glyphicon glyphicon-time"></span> 号源发布</a></li>
                <li><a href="/doctor/patients"><span class="glyphicon glyphicon-user"></span> 我的就诊</a></li>
                <li><a href="/doctor/prescriptions"><span class="glyphicon glyphicon-list-alt"></span> 处方管理</a></li>
                <li><a href="/doctor/checkups"><span class="glyphicon glyphicon-stethoscope"></span> 检查管理</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <h3>检查项目列表</h3>
            <table class="table table-bordered" style="margin-top:20px;">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>患者</th>
                    <th>检查类型</th>
                    <th>描述</th>
                    <th>结果</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(checkups)}">
                    <td colspan="8" class="no-data">暂无检查项目</td>
                </tr>
                <tr th:each="checkup : ${checkups}">
                    <td th:text="${checkup.id}"></td>
                    <td th:text="${checkup.patientName}"></td>
                    <td th:text="${checkup.type}"></td>
                    <td th:text="${checkup.description}"></td>
                    <td th:text="${checkup.result}"></td>
                    <td>
                        <span class="status" th:classappend="${checkup.status == 0 ? 'status-pending' : 'status-completed'}">
                            <span th:text="${checkup.status == 0 ? '待检查' : '已完成'}"></span>
                        </span>
                    </td>
                    <td th:text="${checkup.createTime}"></td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-primary btn-sm" th:onclick="|window.location.href='/doctor/checkup-detail?id=${checkup.id}'|">详情</button>
                            <button class="btn btn-success btn-sm" th:if="${checkup.status == 0}" th:onclick="|window.location.href='/doctor/update-checkup?id=${checkup.id}'|">更新状态</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
