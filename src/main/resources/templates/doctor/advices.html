<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>医嘱管理</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
        }
        .container-fluid {
            padding-top: 20px;
        }
        .main-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="/doctor/dashboard">医院管理系统 - 医生端</a>
        </div>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/doctor/profile"><span class="glyphicon glyphicon-user"></span> 个人信息</a></li>
            <li><a href="/logout"><span class="glyphicon glyphicon-log-out"></span> 退出登录</a></li>
        </ul>
    </div>
</nav>

<div class="container-fluid">
    <div class="main-content">
        <h2>我的医嘱</h2>

        <table class="table table-bordered" style="margin-top:20px;">
            <thead>
            <tr>
                <th>患者姓名</th>
                <th>医嘱内容</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(advices)}">
                <td colspan="5" style="text-align:center; padding: 40px;">暂无医嘱记录</td>
            </tr>
            <tr th:each="advice : ${advices}">
                <td th:text="${advice.patientName}"></td>
                <td th:text="${advice.content}"></td>
                <td>
                    <span th:if="${advice.status == 1}" class="label label-success">有效</span>
                    <span th:if="${advice.status == 0}" class="label label-default">无效</span>
                </td>
                <td th:text="${#temporals.format(advice.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <button class="btn btn-warning btn-sm"
                            th:onclick="'editAdvice(' + ${advice.id} + ')'">修改</button>
                </td>
            </tr>
            </tbody>
        </table>

        <a href="/doctor/dashboard" class="btn btn-default">返回主页</a>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/js/bootstrap.min.js"></script>
<script>
    function editAdvice(id) {
        // TODO: 实现医嘱编辑功能
        alert('医嘱编辑功能开发中...');
    }
</script>
</body>
</html>
