<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/nurses">护士管理</a></li>
                <li><a href="/admin/data">数据管理</a></li>
                <li><a href="/admin/settings">系统设置</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>用户管理</h1>
            <a href="/admin/user/create" class="btn btn-primary">添加用户</a>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>角色</th>
                        <th>性别</th>
                        <th>电话</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.name}"></td>
                        <td>
                            <span th:if="${user.role == 'PATIENT'}">患者</span>
                            <span th:if="${user.role == 'DOCTOR'}">医生</span>
                            <span th:if="${user.role == 'NURSE'}">护士</span>
                            <span th:if="${user.role == 'ADMIN'}">管理员</span>
                        </td>
                        <td th:text="${user.gender == 'male' ? '男' : '女'}"></td>
                        <td th:text="${user.phone}"></td>
                        <td>
                            <a th:href="@{/admin/user/edit/{id}(id=${user.id})}" class="btn btn-secondary">编辑</a>
                            <a th:href="@{/admin/user/delete/{id}(id=${user.id})}" 
                               class="btn btn-danger delete-btn"
                               th:data-name="${user.name}"
                               th:data-type="'用户'">删除</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.delete-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    var name = this.getAttribute('data-name');
                    var type = this.getAttribute('data-type');
                    if (confirm('确定要删除' + type + '「' + name + '」吗？此操作将同时删除相关的角色表记录，且不可恢复！')) {
                        window.location.href = this.getAttribute('href');
                    }
                });
            });
        });
    </script>
</body>
</html>
