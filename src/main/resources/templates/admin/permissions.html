<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限管理 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/permissions">权限管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/nurses">护士管理</a></li>
                <li><a href="/admin/data">数据管理</a></li>
                <li><a href="/admin/settings">系统设置</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>权限管理</h1>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>姓名</th>
                        <th>当前角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.phone}"></td>
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.role}"></td>
                        <td>
                            <select th:onchange="window.location.href='/admin/permission/update/' + ${user.id} + '?role=' + this.value" class="btn btn-secondary">
                                <option value="PATIENT" th:selected="${user.role == 'PATIENT'}">患者</option>
                                <option value="DOCTOR" th:selected="${user.role == 'DOCTOR'}">医生</option>
                                <option value="NURSE" th:selected="${user.role == 'NURSE'}">护士</option>
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">管理员</option>
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
