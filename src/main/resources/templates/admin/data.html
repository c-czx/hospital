<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/permissions">权限管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/nurses">护士管理</a></li>
                <li><a href="/admin/data">数据管理</a></li>
                <li><a href="/admin/settings">系统设置</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>数据管理</h1>
            <div class="dashboard-cards">
                <div class="card">
                    <h3>💾 数据备份</h3>
                    <p>备份当前系统数据</p>
                    <form th:action="@{/admin/data/backup}" method="post">
                        <div class="form-group">
                            <label>备份类型</label>
                            <select name="backupType" class="form-control">
                                <option value="full">完整备份</option>
                                <option value="incremental">增量备份</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>备份说明</label>
                            <input type="text" name="description" placeholder="例如：2024年1月数据备份">
                        </div>
                        <button type="submit" class="btn btn-primary">开始备份</button>
                    </form>
                </div>
                <div class="card">
                    <h3>📂 备份列表</h3>
                    <p>查看历史备份记录</p>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>备份类型</th>
                                <th>备份时间</th>
                                <th>文件大小</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="backup : ${backups}">
                                <td th:text="${backup.id}"></td>
                                <td th:text="${backup.backupType}"></td>
                                <td th:text="${backup.backupTime}"></td>
                                <td th:text="${backup.fileSize}"></td>
                                <td>
                                    <a th:href="@{/admin/data/restore/{id}(id=${backup.id})}" class="btn btn-secondary">恢复</a>
                                    <a th:href="@{/admin/data/download/{id}(id=${backup.id})}" class="btn btn-secondary">下载</a>
                                    <a th:href="@{/admin/data/delete/{id}(id=${backup.id})}" class="btn btn-danger">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card">
                    <h3>📊 数据统计</h3>
                    <p>系统数据统计信息</p>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" th:text="${userCount}"></span>
                            <span class="stat-label">用户总数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" th:text="${departmentCount}"></span>
                            <span class="stat-label">科室总数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" th:text="${doctorCount}"></span>
                            <span class="stat-label">医生总数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" th:text="${appointmentCount}"></span>
                            <span class="stat-label">预约总数</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
