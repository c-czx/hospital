<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户表单 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/appointments">预约管理</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1 th:text="${user.id != null ? '编辑用户' : '添加用户'}"></h1>
            <form th:action="@{/admin/user/create}" method="post" th:object="${user}">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" th:field="*{username}" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" th:field="*{password}" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" th:field="*{name}" required>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select th:field="*{role}" required>
                        <option value="patient">患者</option>
                        <option value="doctor">医生</option>
                        <option value="nurse">护士</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select th:field="*{gender}">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" th:field="*{phone}">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" th:field="*{email}">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>
</body>
</html>
