<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户表单 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/nurses">护士管理</a></li>
                <li><a href="/admin/data">数据管理</a></li>
                <li><a href="/admin/settings">系统设置</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1 th:text="${user.id != null ? '编辑用户' : '添加用户'}"></h1>
            <form th:action="${user.id != null ? '/admin/user/edit/' + user.id : '/admin/user/create'}" method="post" th:object="${user}">
                <div class="form-group">
                    <label th:if="${user.id == null}">密码</label>
                    <label th:if="${user.id != null}">密码（留空则保持不变）</label>
                    <input type="password" th:field="*{password}" th:placeholder="留空则保持不变">
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" th:field="*{name}" required>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select th:field="*{role}" required>
                        <option value="PATIENT">患者</option>
                        <option value="DOCTOR">医生</option>
                        <option value="NURSE">护士</option>
                        <option value="ADMIN">管理员</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select th:field="*{gender}">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" th:field="*{phone}">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" th:field="*{email}">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</body>
</html>
