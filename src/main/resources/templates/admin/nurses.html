<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>护士管理 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/nurses">护士管理</a></li>
                <li><a href="/admin/data">数据管理</a></li>
                <li><a href="/admin/settings">系统设置</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>护士管理</h1>
            <a href="/admin/nurse/create" class="btn btn-primary">添加护士</a>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>科室</th>
                        <th>病区</th>
                        <th>职称</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="nurse : ${nurses}">
                        <td th:text="${nurse.id}"></td>
                        <td th:text="${nurse.user != null ? nurse.user.name : '未知'}"></td>
                        <td th:text="${nurse.department != null ? nurse.department.name : '无'}"></td>
                        <td th:text="${nurse.ward != null ? nurse.ward : '无'}"></td>
                        <td th:text="${nurse.title != null ? nurse.title : '无'}"></td>
                        <td>
                            <a th:href="@{/admin/nurse/edit/{id}(id=${nurse.id})}" class="btn btn-secondary">编辑</a>
                            <a th:href="@{/admin/nurse/delete/{id}(id=${nurse.id})}" class="btn btn-danger">删除</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
