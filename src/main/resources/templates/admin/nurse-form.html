<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>护士表单 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/permissions">权限管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/nurses">护士管理</a></li>
                <li><a href="/admin/data">数据管理</a></li>
                <li><a href="/admin/settings">系统设置</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1 th:text="${nurse.id != null ? '编辑护士' : '添加护士'}"></h1>
            <form th:action="${nurse.id != null ? '/admin/nurse/edit/' + nurse.id : '/admin/nurse/create'}" method="post">
                <!-- 编辑模式：隐藏用户字段 -->
                <input type="hidden" name="userId" th:if="${nurse.id != null}" th:value="${nurse.user != null ? nurse.user.id : ''}">
                <!-- 添加模式：显示用户选择框 -->
                <div class="form-group" th:if="${nurse.id == null}">
                    <label>姓名</label>
                    <select name="userId" required>
                        <option value="">请选择用户</option>
                        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name} + ' (' + ${user.role} + ')'"></option>
                    </select>
                </div>
                <!-- 编辑模式：显示只读姓名（用户姓名） -->
                <div class="form-group" th:if="${nurse.id != null}">
                    <label>姓名</label>
                    <input type="text" th:value="${nurse.user != null ? nurse.user.name : ''}" readonly>
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" name="phone" th:value="${nurse.phone}" required>
                </div>
                <div class="form-group">
                    <label>科室</label>
                    <input type="text" name="department" th:value="${nurse.department}" required>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/admin/nurses}" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</body>
</html>
