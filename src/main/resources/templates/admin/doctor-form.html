<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生表单 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>管理员中心</h3>
            <ul>
                <li><a href="/admin/dashboard">首页</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/departments">科室管理</a></li>
                <li><a href="/admin/doctors">医生管理</a></li>
                <li><a href="/admin/appointments">预约管理</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1 th:text="${doctor.id != null ? '编辑医生' : '添加医生'}"></h1>
            <form th:action="${doctor.id != null ? '/admin/doctor/edit/' + doctor.id : '/admin/doctor/create'}" method="post">
                <div class="form-group">
                    <label>用户</label>
                    <select name="userId" required>
                        <option value="">请选择用户</option>
                        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}" th:selected="${doctor.user != null and doctor.user.id == user.id}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>科室</label>
                    <select name="departmentId" required>
                        <option value="">请选择科室</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}" th:selected="${doctor.department != null and doctor.department.id == dept.id}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>职称</label>
                    <input type="text" name="title" th:value="${doctor.title}">
                </div>
                <div class="form-group">
                    <label>专长</label>
                    <input type="text" name="specialty" th:value="${doctor.specialty}">
                </div>
                <div class="form-group">
                    <label>排班</label>
                    <textarea name="schedule" rows="4" th:text="${doctor.schedule}"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>
</body>
</html>
