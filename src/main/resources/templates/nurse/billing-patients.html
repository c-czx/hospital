<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缴费管理 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>护士中心</h3>
            <ul>
                <li><a href="/nurse/dashboard">首页</a></li>
                <li><a href="/nurse/patients">患者信息查看</a></li>
                <li><a href="/nurse/checkups">协助诊疗</a></li>
                <li><a href="/nurse/billing/patients" class="active">缴费管理</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>缴费管理</h1>
            <p>管理患者的缴费记录</p>

            <div class="patients-list">
                <div class="card">
                    <div class="card-header">
                        患者缴费列表
                    </div>
                    <div class="card-body">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>患者姓名</th>
                                    <th>总费用</th>
                                    <th>已支付</th>
                                    <th>待支付</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="patient : ${patients}">
                                    <td th:text="${patient.name}"></td>
                                    <td th:text="${totalAmounts[patient.id]}"></td>
                                    <td th:text="${paidAmounts[patient.id]}"></td>
                                    <td th:text="${unpaidAmounts[patient.id]}"></td>
                                    <td>
                                        <a th:href="@{/nurse/patient/{id}(id=${patient.id})}" class="btn btn-primary" style="margin-right: 10px;">查看详情</a>
                                        <a th:href="@{/nurse/billing/patient/{id}/pay(id=${patient.id})}" class="btn btn-primary" th:if="${unpaidAmounts[patient.id].compareTo(new java.math.BigDecimal(0)) > 0}">协助支付</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
