<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建缴费 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>护士中心</h3>
            <ul>
                <li><a href="/nurse/dashboard">首页</a></li>
                <li><a href="/nurse/patients">患者信息</a></li>
                <li><a href="/nurse/appointments">预约管理</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>创建缴费</h1>
            <form th:action="@{/nurse/billing/create}" method="post">
                <input type="hidden" name="userId" th:value="${patient.id}">
                
                <div class="form-group">
                    <label>患者姓名</label>
                    <input type="text" th:value="${patient.name}" disabled>
                </div>
                
                <div class="form-group">
                    <label>缴费类型</label>
                    <select name="type" required>
                        <option value="挂号费">挂号费</option>
                        <option value="药费">药费</option>
                        <option value="检查费">检查费</option>
                        <option value="治疗费">治疗费</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" name="amount" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label>状态</label>
                    <select name="status" required>
                        <option value="未支付">未支付</option>
                        <option value="已支付">已支付</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">创建缴费</button>
            </form>
        </div>
    </div>
</body>
</html>
