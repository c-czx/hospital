<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者详情 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>护士中心</h3>
            <ul>
                <li><a href="/nurse/dashboard">首页</a></li>
                <li><a href="/nurse/patients">患者信息</a></li>
                <li><a href="/nurse/appointments">预约管理</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>患者详情</h1>
            <div class="patient-detail">
                <div class="patient-info">
                    <h3>基本信息</h3>
                    <p><strong>姓名：</strong><span th:text="${patient.name}"></span></p>
                    <p><strong>性别：</strong><span th:text="${patient.gender == 'male' ? '男' : '女'}"></span></p>
                    <p><strong>电话：</strong><span th:text="${patient.phone}"></span></p>
                    <p><strong>邮箱：</strong><span th:text="${patient.email}"></span></p>
                </div>
                
                <div class="appointments-section">
                    <h3>预约记录</h3>
                    <div th:each="appointment : ${appointments}" class="appointment-item">
                        <p><strong>科室：</strong><span th:text="${appointment.department.name}"></span></p>
                        <p><strong>医生：</strong><span th:text="${appointment.doctor.user.name}"></span></p>
                        <p><strong>预约时间：</strong><span th:text="${#temporals.format(appointment.appointmentTime, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
                        <p><strong>状态：</strong><span th:text="${appointment.status}"></span></p>
                    </div>
                </div>
                
                <div class="medical-records-section">
                    <h3>病历记录</h3>
                    <div th:if="${medicalRecords.isEmpty()}">
                        <p>暂无病历记录</p>
                        <a th:href="@{/nurse/medical-record/create(userId=${patient.id})}" class="btn btn-primary">创建病历</a>
                    </div>
                    <div th:each="record : ${medicalRecords}" class="record-item">
                        <p><strong>诊断：</strong><span th:text="${record.diagnosisResult}"></span></p>
                        <p><strong>主诉：</strong><span th:text="${record.chiefComplaint}"></span></p>
                        <p><strong>现病史：</strong><span th:text="${record.presentIllness}"></span></p>
                        <p><strong>体温：</strong><span th:text="${record.temperature == null ? '未记录' : (record.temperature + '℃')}"></span></p>
                        <p><strong>血压：</strong><span th:text="${record.bloodPressure == null ? '未记录' : (record.bloodPressure + 'mmHg')}"></span></p>
                        <p><strong>护士记录：</strong><span th:text="${record.nurseNotes == null ? '无' : record.nurseNotes}"></span></p>
                        <p><strong>时间：</strong><span th:text="${#temporals.format(record.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
                        <a th:href="@{/nurse/medical-record/edit/{id}(id=${record.id})}" class="btn btn-secondary">编辑</a>
                    </div>
                </div>
                
                <div class="billing-section">
                    <h3>缴费记录</h3>
                    <div th:each="billing : ${billings}" class="billing-item">
                        <p><strong>类型：</strong><span th:text="${billing.type}"></span></p>
                        <p><strong>金额：</strong><span th:text="${billing.amount}"></span></p>
                        <p><strong>状态：</strong><span th:text="${billing.status}"></span></p>
                        <div th:if="${billing.status == '未支付'}">
                            <a th:href="@{/nurse/billing/{id}/pay(id=${billing.id})}" class="btn btn-primary">支付</a>
                        </div>
                    </div>
                    <a th:href="@{/nurse/billing/create(userId=${patient.id})}" class="btn btn-secondary">创建缴费</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
