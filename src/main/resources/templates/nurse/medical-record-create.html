<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建病历 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>护士中心</h3>
            <ul>
                <li><a href="/nurse/dashboard">首页</a></li>
                <li><a href="/nurse/patients">患者信息查看</a></li>
                <li><a href="/nurse/appointments">协助诊疗</a></li>
                <li><a href="/nurse/billing/patients">缴费管理</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>创建病历</h1>
            <div class="patient-info">
                <h3>患者信息</h3>
                <p><strong>姓名：</strong><span th:text="${patient.name}"></span></p>
                <p><strong>性别：</strong><span th:text="${patient.gender == 'male' ? '男' : '女'}"></span></p>
                <p><strong>电话：</strong><span th:text="${patient.phone}"></span></p>
            </div>
            
            <form th:action="@{/nurse/medical-record/create}" method="post">
                <input type="hidden" name="userId" th:value="${patient.id}">
                
                <div class="form-group">
                    <label>医生</label>
                    <select name="doctorId" required>
                        <option value="">请选择医生</option>
                        <option th:each="doctor : ${doctors}" th:value="${doctor.id}" th:text="${doctor.user.name}"></option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>主诉</label>
                    <input type="text" name="chiefComplaint">
                </div>
                
                <div class="form-group">
                    <label>现病史</label>
                    <textarea name="presentIllness" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label>诊断结果</label>
                    <input type="text" name="diagnosisResult">
                </div>
                
                <div class="form-group">
                    <label>体温（℃）</label>
                    <input type="number" name="temperature" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>血压（mmHg）</label>
                    <input type="number" name="bloodPressure">
                </div>
                
                <div class="form-group">
                    <label>护士记录</label>
                    <textarea name="nurseNotes" rows="4"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">创建病历</button>
                <a th:href="@{/nurse/patient/{id}(id=${patient.id})}" class="btn btn-secondary">返回</a>
            </form>
        </div>
    </div>
</body>
</html>
