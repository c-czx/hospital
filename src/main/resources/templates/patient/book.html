<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约挂号 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>患者中心</h3>
            <ul>
                <li><a href="/patient/dashboard">首页</a></li>
                <li><a href="/patient/book">预约挂号</a></li>
                <li><a href="/patient/appointments">我的预约</a></li>
                <li><a href="/patient/orders">我的订单</a></li>
                <li><a href="/patient/departments">科室查询</a></li>
                <li><a href="/patient/profile">个人信息</a></li>
                <li><a href="/logout" onclick="return confirm('确定要退出登录吗？');">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>预约挂号</h1>
            <div th:if="${param.error == 'past_time'}" style="color: red; margin-bottom: 15px;">
                <p th:text="${param.message}">预约时间已过期，请选择未来的时间</p>
            </div>
            <form th:action="@{/patient/book}" method="post" id="bookingForm" onsubmit="return validateForm()">
                <div class="form-group">
                    <label>选择科室</label>
                    <select name="departmentId" id="departmentSelect" required onchange="console.log('科室选择改变，调用 loadDoctors'); loadDoctors();">
                        <option value="">请选择科室</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}" th:selected="${dept.id == selectedDepartmentId}"></option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>选择医生</label>
                    <select name="doctorId" id="doctorSelect" required onchange="loadSchedules()">
                        <option value="">请先选择科室</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>选择号源</label>
                    <div id="scheduleList" style="margin-top: 10px;">
                        <p>请先选择医生</p>
                    </div>
                </div>
                
                <div class="form-group" style="display: none;">
                    <input type="datetime-local" name="appointmentTime" id="appointmentTime">
                </div>
                
                <div class="form-group">
                    <label>症状描述</label>
                    <textarea name="symptoms" rows="4"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">提交预约</button>
            </form>
        </div>
    </div>
    
    <script>
        // 获取预选的科室ID和医生ID
        const selectedDepartmentId = /*[[${selectedDepartmentId}]]*/ null;
        const selectedDoctorId = /*[[${selectedDoctorId}]]*/ null;
        
        function loadDoctors() {
            const departmentId = document.getElementById('departmentSelect').value;
            const doctorSelect = document.getElementById('doctorSelect');
            const scheduleList = document.getElementById('scheduleList');
            console.log('loadDoctors 被调用，departmentId:', departmentId);
            
            if (departmentId) {
                console.log('发起请求获取医生列表，URL:', `/patient/doctors?departmentId=${departmentId}`);
                fetch(`/patient/doctors?departmentId=${departmentId}`)
                    .then(response => {
                        console.log('请求响应状态:', response.status);
                        return response.json();
                    })
                    .then(doctors => {
                        console.log('获取医生列表成功，医生数量:', doctors ? doctors.length : 0);
                        console.log('医生列表:', doctors);
                        doctorSelect.innerHTML = '<option value="">请选择医生</option>';
                        scheduleList.innerHTML = '<p>请先选择医生</p>';

                        if (doctors && doctors.length > 0) {
                            doctors.forEach(doctor => {
                                const option = document.createElement('option');
                                option.value = doctor.id;
                                const doctorName = doctor.user && doctor.user.name ? doctor.user.name : '未知医生';
                                const doctorTitle = doctor.title ? doctor.title : '未知职称';
                                const doctorSpecialty = doctor.specialty ? doctor.specialty : '未知专长';
                                option.textContent = `${doctorName} - ${doctorTitle} (${doctorSpecialty})`;
                                doctorSelect.appendChild(option);
                            });
                        } else {
                            const option = document.createElement('option');
                            option.value = '';
                            option.textContent = '该科室暂无医生';
                            doctorSelect.appendChild(option);
                        }
                    })
                    .catch(error => {
                        console.error('加载医生列表失败:', error);
                        doctorSelect.innerHTML = '<option value="">加载失败，请重试</option>';
                    });
            } else {
                doctorSelect.innerHTML = '<option value="">请先选择科室</option>';
                scheduleList.innerHTML = '<p>请先选择医生</p>';
            }
        }
        
        // 页面加载时自动执行
        window.onload = function() {
            console.log('页面加载完成');
            const departmentSelect = document.getElementById('departmentSelect');
            console.log('科室选择框初始值:', departmentSelect.value);
            // 如果有预选科室，自动加载医生
            if (departmentSelect.value) {
                console.log('页面加载时发现预选科室，调用 loadDoctors');
                loadDoctors();
            }
        }
        
        function loadSchedules() {
            const doctorId = document.getElementById('doctorSelect').value;
            const scheduleList = document.getElementById('scheduleList');
            
            if (doctorId) {
                fetch(`/patient/schedules?doctorId=${doctorId}`)
                    .then(response => response.json())
                    .then(schedules => {
                        if (schedules && schedules.length > 0) {
                            scheduleList.innerHTML = '';
                            
                            schedules.forEach(schedule => {
                                if (schedule.status === 1 && schedule.remainNumber > 0) {
                                    const scheduleItem = document.createElement('div');
                                    scheduleItem.style.border = '1px solid #ddd';
                                    scheduleItem.style.borderRadius = '8px';
                                    scheduleItem.style.padding = '10px';
                                    scheduleItem.style.marginBottom = '10px';
                                    scheduleItem.style.cursor = 'pointer';
                                    
                                    scheduleItem.innerHTML = `
                                        <div style="font-weight: bold;">${formatDateTime(schedule.startTime)} - ${formatDateTime(schedule.endTime)}</div>
                                        <div>剩余号源: ${schedule.remainNumber}/${schedule.totalNumber}</div>
                                    `;
                                    
                                    scheduleItem.addEventListener('click', function() {
                                        // 确保日期时间格式正确
                                        const startTime = new Date(schedule.startTime);
                                        const year = startTime.getFullYear();
                                        const month = String(startTime.getMonth() + 1).padStart(2, '0');
                                        const day = String(startTime.getDate()).padStart(2, '0');
                                        const hours = String(startTime.getHours()).padStart(2, '0');
                                        const minutes = String(startTime.getMinutes()).padStart(2, '0');
                                        const seconds = String(startTime.getSeconds()).padStart(2, '0');
                                        const formattedTime = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
                                        document.getElementById('appointmentTime').value = formattedTime;
                                        
                                        // 移除其他选中项的样式
                                        const items = scheduleList.querySelectorAll('div');
                                        items.forEach(item => item.style.backgroundColor = '');
                                        
                                        // 设置当前选中项的样式
                                        this.style.backgroundColor = '#e6f7ff';
                                    });
                                    
                                    scheduleList.appendChild(scheduleItem);
                                }
                            });
                        } else {
                            scheduleList.innerHTML = '<p>该医生暂无可用号源</p>';
                        }
                    })
                    .catch(error => {
                        console.error('加载号源失败:', error);
                        scheduleList.innerHTML = '<p>加载号源失败，请重试</p>';
                    });
            } else {
                scheduleList.innerHTML = '<p>请先选择医生</p>';
            }
        }
        
        function formatDateTime(dateTimeStr) {
            const date = new Date(dateTimeStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }
        
        function validateForm() {
            const departmentId = document.getElementById('departmentSelect').value;
            const doctorId = document.getElementById('doctorSelect').value;
            const appointmentTime = document.getElementById('appointmentTime').value;
            const symptoms = document.querySelector('textarea[name="symptoms"]').value;
            
            console.log('表单提交信息:');
            console.log('科室ID:', departmentId);
            console.log('医生ID:', doctorId);
            console.log('预约时间:', appointmentTime);
            console.log('症状描述:', symptoms);
            
            if (!departmentId) {
                alert('请选择科室');
                return false;
            }
            
            if (!doctorId) {
                alert('请选择医生');
                return false;
            }
            
            if (!appointmentTime) {
                alert('请选择号源');
                return false;
            }
            
            if (!symptoms) {
                alert('请填写症状描述');
                return false;
            }
            
            return true;
        }
    </script>
</body>
</html>
