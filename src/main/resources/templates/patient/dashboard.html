<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者首页 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>患者中心</h3>
            <ul>
                <li><a href="/patient/dashboard">首页</a></li>
                <li><a href="/patient/book">预约挂号</a></li>
                <li><a href="/patient/appointments">我的订单</a></li>
                <li><a href="/patient/departments">科室医生查询</a></li>
                <li><a href="/patient/available-slots">号源查询</a></li>
                <li><a href="/patient/profile">个人信息管理</a></li>
                <li><a href="/logout" onclick="return confirm('确定要退出登录吗？');">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>您好，<span th:text="${user.name}"></span></h1>
            <div class="dashboard-cards">
                <div class="card">
                    <h3>📅 预约挂号</h3>
                    <p>选择科室、医生、时间段进行预约挂号</p>
                    <a href="/patient/book" class="btn btn-primary">立即预约</a>
                </div>
                <div class="card">
                    <h3>📋 我的订单</h3>
                    <p>查看预约记录、已就诊记录、缴费记录</p>
                    <a href="/patient/appointments" class="btn btn-secondary">查看订单</a>
                </div>
                <div class="card">
                    <h3>🏥 科室医生查询</h3>
                    <p>查询医院所有科室和医生信息</p>
                    <a href="/patient/departments" class="btn btn-secondary">查询科室</a>
                </div>
                <div class="card">
                    <h3>🎫 号源查询</h3>
                    <p>查询剩余号源数量、挂号时间</p>
                    <a href="/patient/available-slots" class="btn btn-secondary">查询号源</a>
                </div>
                <div class="card">
                    <h3>👤 个人信息管理</h3>
                    <p>修改姓名、性别、联系方式等</p>
                    <a href="/patient/profile" class="btn btn-secondary">管理信息</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
