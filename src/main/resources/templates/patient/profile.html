<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 医院挂号系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h3>患者中心</h3>
            <ul>
                <li><a href="/patient/dashboard">首页</a></li>
                <li><a href="/patient/book">预约挂号</a></li>
                <li><a href="/patient/appointments">我的预约</a></li>
                <li><a href="/patient/departments">科室查询</a></li>
                <li><a href="/patient/profile">个人信息</a></li>
                <li><a href="/logout">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <h1>个人信息</h1>
            <form th:action="@{/patient/profile}" method="post">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" th:value="${user.username}" disabled>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" th:value="${user.name}" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select name="gender">
                        <option value="male" th:selected="${user.gender == 'male'}">男</option>
                        <option value="female" th:selected="${user.gender == 'female'}">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" name="phone" th:value="${user.phone}">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" th:value="${user.email}">
                </div>
                <button type="submit" class="btn btn-primary">保存修改</button>
            </form>
        </div>
    </div>
</body>
</html>
