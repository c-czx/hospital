spring.application.name=hospital-system

# 服务器端口号
server.port=8080

# 数据库配置 (MySQL)
# 数据库连接 URL
# - jdbc:mysql://localhost:3306/hospital_db: 连接到本地的 hospital_db 数据库
# - createDatabaseIfNotExist=true: 如果数据库不存在则自动创建
# - useSSL=false: 不使用 SSL 加密
# - serverTimezone=UTC: 设置服务器时区为 UTC
# - allowPublicKeyRetrieval=true: 允许公钥检索（解决 MySQL 8.0+ 连接问题）
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA/Hibernate 配置
# 数据库策略：update - 自动更新数据库表结构
spring.jpa.hibernate.ddl-auto=update
# 是否在控制台显示 SQL 语句
spring.jpa.show-sql=true
# 是否格式化 SQL 语句，使其更易读
spring.jpa.properties.hibernate.format_sql=true
# 数据库方言：指定使用 MySQL 方言
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf 模板引擎配置
# 模板文件路径前缀
spring.thymeleaf.prefix=classpath:/templates/
# 模板文件后缀
spring.thymeleaf.suffix=.html
# 是否禁用模板缓存（开发环境建议关闭，以便实时看到修改效果）
spring.thymeleaf.cache=false

# DevTools configuration
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources/templates

# LiveReload configuration
spring.devtools.livereload.enabled=true
